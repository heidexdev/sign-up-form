<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sing up</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="image-sidebar">
        <img
          class="sidebar-background"
          src="images/halie-west-25xggax4bSA-unsplash.jpg"
          alt=""
        />
        <div class="sidebar-header">
          <img class="sidebar-icon" src="images/odin-lined.png" alt="" />
          <span class="sidebar-title">ODIN</span>
        </div>
      </div>
      <div class="main">
        <div class="info">
          <p class="text">
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams. Sign up
            now to get started.
          </p>
          <p class="message">You know you want to.</p>
        </div>
        <div id="signup-form" class="form">
          <form action="">
            <h2 class="form-header"></h2>
            <div>
              <label for="first-name">FIRST NAME</label>
              <input type="text" name="first-name" id="first-name" />
            </div>
            <div>
              <label for="last-name">last NAME</label>
              <input type="text" name="last-name" id="last-name" />
            </div>
            <div>
              <label for="email">EMAIL</label>
              <input type="text" name="email" id="email" />
            </div>
            <div>
              <label for="phone-number">PHONE NUMBER</label>
              <input type="text" name="phone-number" id="phone-number" />
            </div>
            <div>
              <label for="first-name">FIRST NAME</label>
              <input type="text" name="first-name" id="first-name" />
            </div>
            <div>
              <label for="password">PASSWORD</label>
              <input type="password" name="password" id="password" />
            </div>
            <div>
              <label for="confirm-pass">CONFIRM PASSWORD</label>
              <input type="password" name="confirm-pass" id="confirm-pass" />
            </div>
          </form>
        </div>
        <div class="bottom">
          <button type="submit" form="signup-form">Create Account</button>
          <p class="bottom-message">
            Already have an acount ? <a href="#">log in</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
