<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sing up</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="image-sidebar">
        <img
          class="sidebar-background"
          src="images/halie-west-25xggax4bSA-unsplash.jpg"
          alt=""
        />
        <div class="sidebar-header">
          <img class="sidebar-icon" src="images/odin-lined.png" alt="" />
          <span class="sidebar-title">ODIN</span>
        </div>
      </div>
      <div class="main">
        <div class="info">
          <p class="text">
            This is not a real online service! You know you need something like
            this in your life to help you realize your deepest dreams. Sign up
            now to get started.
          </p>
          <p class="message">You know you want to.</p>
        </div>
        <div class="form-container">
          <form id="signup-form" action="">
            <h2 class="form-header">Lets do this!</h2>
            <div class="form-inputs">
              <div class="input">
                <label for="first-name">FIRST NAME</label>
                <input minlength="1" maxlength="100" type="text" name="first-name" id="first-name" required />
              </div>
              <div class="input">
                <label for="last-name">LAST NAME</label>
                <input minlength="1" maxlength="100" type="text" name="last-name" id="last-name" required />
              </div>
              <div class="input">
                <label for="email">EMAIL</label>
                <input minlength="1" maxlength="100" type="email" name="email" id="email" required />
              </div>
              <div class="input">
                <label for="phone-number">PHONE NUMBER</label>
                <input
                  type="tel"
                  name="phone-number"
                  id="phone-number"
                  required
                />
              </div>
              <div class="input">
                <label for="password">PASSWORD</label>
                <input minlength="8" maxlength="100" type="password" name="password" id="password" required />
              </div>
              <div class="input">
                <label for="confirm-pass">CONFIRM PASSWORD</label>
                <input
                  type="password"
                  name="confirm-pass"
                  id="confirm-pass"
                  required
                />
              </div>
            </div>
          </form>
        </div>
        <div class="bottom">
          <button type="submit" form="signup-form">Create Account</button>
          <p class="bottom-message">
            Already have an acount ? <a href="#">log in</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
